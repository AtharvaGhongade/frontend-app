<!DOCTYPE html>
<html>
<head>
  <title>Azure 3-Tier App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 60px;
      background: #f4f8ff;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    pre {
      width: 70%;
      margin: 20px auto;
      background: white;
      padding: 15px;
      border-radius: 8px;
      text-align: left;
    }
  </style>
</head>
<body>

  <h1>Azure 3-Tier Application</h1>
  <p>Frontend + Backend + SQL Database</p>

  <button onclick="loadData()">Fetch Backend Data</button>

  <pre id="output">Click the button...</pre>

<script>
async function loadData() {
  const res = await fetch("https://backend-123.azurewebsites.net/api");
  const data = await res.json();

  const utcTime = data.data[0].currentTime;
  const localTime = new Date(utcTime).toLocaleString("en-IN");

  document.getElementById("output").textContent =
    "Message: " + data.message + "\n\n" +
    "Current Time (IST): " + localTime;
}
</script>

</body>
</html>
